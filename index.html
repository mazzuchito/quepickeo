<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>

<title>QuePickeo.lol | Buscador de Counters de League of Legends</title>
<meta name="description" content="¿No sabes qué pickear? En QuePickeo.lol encuentras los mejores counters y sinergias para ganar tus partidas de League of Legends. Herramienta gratuita y rápida."/>
<meta name="keywords" content="LoL counters, que pickear lol, counters league of legends, quepickeo, mejores picks lol"/>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet"/>
<style>
/* TUS ESTILOS ORIGINALES COMPLETOS */
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#0e1015;--bg2:#161b22;--bg3:#1c2230;--bg4:#232b3a;
  --border:#2a3347;--border2:#344060;
  --text:#c9d1d9;--text2:#8b949e;--text3:#6e7681;
  --blue:#1f6feb;--blue2:#388bfd;
  --gold:#d4af37;--gold2:#f0d060;
  --green:#3fb950;--red:#f85149;--orange:#f0883e;
}
html,body{min-height:100vh;background:var(--bg);font-family:'Inter',sans-serif;color:var(--text)}

nav{background:var(--bg2);border-bottom:1px solid var(--border);padding:0 1.5rem;display:flex;align-items:center;justify-content:space-between;height:64px;position:sticky;top:0;z-index:100}
.brand{display:flex;align-items:center;gap:12px;text-decoration:none}
.logo-box{width:32px;height:32px;background:linear-gradient(135deg, var(--gold), #b8860b);border-radius:8px;display:flex;align-items:center;justify-content:center;box-shadow:0 0 15px rgba(212,175,55,0.2)}
.logo-box span{color:#000;font-weight:bold;font-size:18px}
.brand-name{font-weight:700;font-size:20px;letter-spacing:-0.5px;background:linear-gradient(to right, #fff, var(--text2));-webkit-background-clip:text;-webkit-text-fill-color:transparent}

main{max-width:1200px;margin:0 auto;padding:2rem 1.5rem}
.hero{text-align:center;margin-bottom:3rem;padding:2rem 0}
.hero h1{font-size:48px;font-weight:800;margin-bottom:1rem;background:linear-gradient(to bottom, #fff, #999);-webkit-background-clip:text;-webkit-text-fill-color:transparent;letter-spacing:-1px}
.hero p{color:var(--text2);font-size:19px;max-width:600px;margin:0 auto;line-height:1.6}

.search-container{position:relative;max-width:600px;margin:0 auto 3rem}
.search-icon{position:absolute;left:18px;top:50%;transform:translateY(-50%);color:var(--text3);font-size:18px;pointer-events:none}
input{width:100%;background:var(--bg2);border:1px solid var(--border);border-radius:14px;padding:16px 16px 16px 52px;color:#fff;font-size:16px;transition:all 0.25s cubic-bezier(0.4,0,0.2,1);outline:none;box-shadow:0 4px 20px rgba(0,0,0,0.3)}
input:focus{border-color:var(--blue);box-shadow:0 0 0 4px rgba(31,111,235,0.2);background:var(--bg3);transform:translateY(-1px)}

.results-grid{display:grid;grid-template-columns:repeat(auto-fill, minmax(320px, 1fr));gap:1.5rem}
.card{background:var(--bg2);border:1px solid var(--border);border-radius:18px;overflow:hidden;transition:all 0.3s cubic-bezier(0.4,0,0.2,1);position:relative;display:flex;flex-direction:column}
.card:hover{transform:translateY(-6px);border-color:var(--border2);box-shadow:0 20px 40px rgba(0,0,0,0.4)}
.card-header{padding:1.5rem;display:flex;align-items:center;gap:14px;background:linear-gradient(to bottom, var(--bg3), var(--bg2))}
.champ-icon{width:56px;height:56px;border-radius:12px;background:var(--bg4);border:2px solid var(--border);display:flex;align-items:center;justify-content:center;font-weight:bold;color:var(--gold);font-size:20px}
.champ-info h3{font-size:20px;font-weight:700;color:#fff;margin-bottom:2px}
.champ-info span{font-size:12px;color:var(--text3);text-transform:uppercase;letter-spacing:1.5px;font-weight:600}

.card-content{padding:1.5rem;flex:1}
.stat-row{display:flex;justify-content:space-between;margin-bottom:1.5rem;padding:1rem;background:var(--bg3);border-radius:12px;border:1px solid var(--border)}
.stat-item{text-align:center;flex:1}
.stat-val{display:block;font-size:22px;font-weight:800;color:var(--gold);margin-bottom:2px}
.stat-label{font-size:11px;color:var(--text3);text-transform:uppercase;letter-spacing:0.5px}

.list-title{font-size:12px;font-weight:800;color:var(--text2);text-transform:uppercase;margin-bottom:14px;display:flex;align-items:center;gap:10px}
.list-title::after{content:'';height:1px;background:var(--border);flex:1}
.counter-list{display:flex;flex-direction:column;gap:10px}
.counter-item{display:flex;align-items:center;justify-content:space-between;padding:10px 14px;background:var(--bg3);border:1px solid var(--border);border-radius:10px;font-size:14px;font-weight:600;transition:all 0.2s}
.counter-item:hover{border-color:var(--blue);background:var(--bg4)}
.counter-name{color:var(--text)}
.counter-winrate{color:var(--green);font-family:'JetBrains Mono',monospace}

#music-player{position:fixed;bottom:24px;right:24px;width:340px;background:rgba(22,27,34,0.95);backdrop-filter:blur(12px);border:1px solid var(--border);border-radius:20px;padding:20px;box-shadow:0 15px 50px rgba(0,0,0,0.6);z-index:1000;transition:all 0.3s}
.pl-header{display:flex;align-items:center;gap:14px;margin-bottom:16px}
.pl-info{flex:1;min-width:0}
#pl-title{font-size:15px;font-weight:700;color:#fff;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;margin-bottom:2px}
#pl-artist{font-size:12px;color:var(--text3)}
.pl-controls{display:flex;align-items:center;justify-content:center;gap:20px;margin-bottom:16px}
.pl-btn{background:none;border:none;color:var(--text2);cursor:pointer;font-size:20px;transition:all 0.2s}
.pl-btn:hover{color:var(--gold);transform:scale(1.1)}
#pl-play{width:46px;height:46px;background:var(--gold);color:#000;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:18px;box-shadow:0 4px 15px rgba(212,175,55,0.3)}
.pl-progress{height:6px;background:var(--bg4);border-radius:3px;position:relative;margin-bottom:10px;overflow:hidden;cursor:pointer}
#pl-prog{position:absolute;left:0;top:0;height:100%;background:var(--gold);width:0%;transition:width 0.1s linear}
.pl-meta{display:flex;justify-content:space-between;font-size:11px;color:var(--text3);font-family:monospace;font-weight:600}

iframe#sc-iframe{display:none}
@media (max-width: 640px) {
  nav{padding:0 1rem}
  main{padding:1.5rem 1rem}
  .hero h1{font-size:36px}
  #music-player{width:calc(100% - 32px);left:16px;bottom:16px;padding:16px}
}

/* SECCIÓN SEO ADICIONAL */
.seo-info { max-width: 800px; margin: 40px auto; text-align: center; color: var(--text3); font-size: 14px; }
</style>
</head>
<body>

<nav>
  <a href="/" class="brand">
    <div class="logo-box"><span>Q</span></div>
    <span class="brand-name">QuePickeo.lol</span>
  </a>
</nav>

<main>
  <div class="hero">
    <h1>¿Qué pickear ahora?</h1>
    <p>La herramienta definitiva para encontrar counters y dominar tus partidas de LoL.</p>
  </div>

  <div class="search-container">
    <span class="search-icon">🔍</span>
    <input type="text" id="searchInput" placeholder="Busca un campeón (ej. Aatrox, Ahri...)" oninput="search()">
  </div>

  <div id="results" class="results-grid"></div>

  <section class="seo-info">
    <p>En QuePickeo.lol analizamos los mejores counters de League of Legends para que sepas qué elegir en cada situación.</p>
  </section>
</main>

<div id="music-player">
  <div class="pl-header">
    <div class="logo-box" style="width:44px;height:44px;background:var(--bg3)"><span>♫</span></div>
    <div class="pl-info">
      <div id="pl-title">Iniciando radio...</div>
      <div id="pl-artist">SoundCloud Lo-Fi</div>
    </div>
  </div>
